<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The new S-Class — Mercedes-Benz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  :root {
    --black: #060608;
    --navy: #080c14;
    --dark: #0d1117;
    --card: #0f1318;
    --card-border: rgba(180,180,200,0.12);
    --silver: #c0c4cc;
    --silver-dim: #7a7e88;
    --white: #f4f5f7;
    --white-dim: rgba(244,245,247,0.6);
    --accent: #c8aa72;
    --accent-dim: rgba(200,170,114,0.4);
    --glass: rgba(15,19,24,0.85);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body {
    -webkit-font-smoothing: antialiased;
    background-color: var(--black);
    color: var(--white);
    font-family: sans-serif;
  }

  /* 스파클링 블랙 에디션 스타일 커스텀 추가 */
  .edition-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 40px;
    margin: 40px auto;
    max-width: 1200px;
    text-align: center;
  }
  .edition-title {
    font-size: 28px;
    color: var(--accent);
    margin-bottom: 10px;
    font-weight: bold;
  }
  .edition-subtitle {
    font-size: 16px;
    color: var(--silver);
    margin-bottom: 30px;
  }
  .img-container {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    overflow: hidden;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .img-container:hover {
    transform: scale(1.02);
    box-shadow: 0 25px 50px rgba(200,170,114,0.15);
  }
  .img-container img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: cover;
  }

  /* 라이트박스 애니메이션 및 스타일 */
  @keyframes lbFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .custom-lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10000;
    background: rgba(0, 0, 0, 0.92);
    align-items: center;
    justify-content: center;
    animation: lbFadeIn 0.2s ease;
  }
  .lightbox-img {
    max-width: 90%;
    max-height: 85vh;
    object-fit: contain;
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
    border-radius: 4px;
  }
  .lightbox-close {
    position: absolute;
    top: 30px;
    right: 40px;
    background: none;
    border: none;
    color: #fff;
    font-size: 35px;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .lightbox-close:hover {
    opacity: 1;
  }
</style>
</head>
<body>

<div class="edition-card">
  <div class="edition-title">S 500 4MATIC Sparkling Black Edition</div>
  <div class="edition-subtitle">특별한 깊이감을 선사하는 오디시안 블랙과 고품격 디테일의 조화</div>
  
  <div class="img-container" onclick="openSparklingLightbox()">
    <img src="sparkling_black_side.jpg" alt="S 500 4MATIC Sparkling Black Edition 측면">
  </div>
</div>

<div id="sparklingLightbox" class="custom-lightbox" onclick="closeSparklingLightboxBg(event)">
  <button class="lightbox-close" onclick="closeSparklingLightbox()">✕</button>
  <img src="sparkling_black_side.jpg" class="lightbox-img" alt="S 500 4MATIC Sparkling Black Edition 측면 확대">
</div>

<script>
  // 라이트박스 열기
  function openSparklingLightbox() {
    const lb = document.getElementById('sparklingLightbox');
    lb.style.display = 'flex';
    document.body.style.overflow = 'hidden'; // 뒤쪽 본문 스크롤 방지
  }

  // 라이트박스 닫기 (✕ 버튼 클릭 시)
  function closeSparklingLightbox() {
    const lb = document.getElementById('sparklingLightbox');
    lb.style.display = 'none';
    document.body.style.overflow = ''; // 스크롤 복원
  }

  // 라이트박스 바깥 검은 배경 클릭 시 닫기
  function closeSparklingLightboxBg(event) {
    // 클릭한 대상이 이미지(lightbox-img)가 아니라 배경일 때만 닫힘
    if (!event.target.classList.contains('lightbox-img')) {
      closeSparklingLightbox();
    }
  }
</script>

</body>
</html>
